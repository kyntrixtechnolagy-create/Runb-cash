name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          
      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: |
          echo "VITE_SUPABASE_URL=https://vgdbrxyuxzjblevbxbpg.supabase.co" > .env.production
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZGJyeHl1eHpqYmxldmJ4YnBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4Mzc2OTMsImV4cCI6MjA5ODQxMzY5M30.0TSnxfW6eN4qmFdlXLFD2rVxW94Gvj9RZHHBHFyTsxY" >> .env.production
          echo "VITE_COMPANY_CODE=cashflow123" >> .env.production
          echo "VITE_AUDITOR_CODE=auditor123" >> .env.production
          echo "VITE_VAPID_PUBLIC_KEY=BGcMzb3wbZ08rtGCVwKUzuMwgESTWXJlXN9L0CJxjCH_bii2I7yBmH82fdkiaM49YS46JYbQN8AVFe7dDfzz5bw" >> .env.production
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Capacitor Sync
        run: |
          npx cap copy android
          npx cap update android

      - name: Build APK with Gradle
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
